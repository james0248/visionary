seed: 42
learning_rate: 2e-4
lpips_weight: 0.2
log_interval: 100
eval_steps: 1000
total_steps: 150000

dataset:
  train_dir: data/train/
  eval_dir: data/eval/
  frame_length: 16
  batch_size: 32
  worker_count: 8
  patch_size: 16
  pad_width: [7, 0]
  eval:
    max_batches: 16

tokenizer:
  _target_: visionary.tokenizer.Tokenizer
  num_layers: 6
  num_latents: 48
  num_heads: 6
  num_kv_heads: 2
  model_dim: 384
  head_dim: 64
  mlp_hidden_dim: 1024
  channel_dim: 24
  x_len: 10
  y_len: 14
  base: 10000.0

checkpoint:
  manager:
    _target_: visionary.common.checkpoint.CheckpointManager
    directory: gs://visionary-exp/breakout/checkpoints/baseline
    options:
      _target_: orbax.checkpoint.CheckpointManagerOptions
      save_interval_steps: 5000
      max_to_keep: 5
      enable_async_checkpointing: true
  resume_step: null

wandb:
  enabled: true
  project: visionary
