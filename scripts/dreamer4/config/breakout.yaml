seed: 42
learning_rate: 2e-4
reconstruction_loss: mse
lpips_weight: 0.1
motion_loss_weight: 0.0
masked_mse: false
log_interval: 100
eval_steps: 1000
total_steps: 150000
overfit_single_batch: false
exp_name: ???

dataset:
  train_dir: data/train/
  eval_dir: data/eval/
  frame_length: 32
  batch_size: 2
  # Chunked records keep first-batch startup predictable on local storage.
  worker_count: 0
  num_threads: 2
  prefetch_buffer_size: 2
  resize_shape: [120, 168]
  patch_size: 8
  pad_width: [0, 0]
  eval:
    max_batches: 16
    log_frames: 8

tokenizer:
  _target_: visionary.tokenizer.Tokenizer
  num_layers: 8
  num_latents: 96
  num_heads: 8
  num_kv_heads: 2
  model_dim: 256
  head_dim: 64
  mlp_hidden_dim: 768
  channel_dim: 24
  x_len: 15
  y_len: 21
  base: 10000.0
  decoder_single_image_token: false
  bottleneck_norm: rmsnorm
  independent_prob: 0.3
  attention_logit_soft_cap: 50.0

checkpoint:
  manager:
    _target_: visionary.common.checkpoint.CheckpointManager
    directory: gs://visionary-exp/breakout/checkpoints/${exp_name}
    options:
      _target_: orbax.checkpoint.CheckpointManagerOptions
      save_interval_steps: 5000
      max_to_keep: 5
      enable_async_checkpointing: true
  resume_step: null

wandb:
  enabled: true
  project: visionary
