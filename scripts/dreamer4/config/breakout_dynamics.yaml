seed: 42
learning_rate: 2e-4
log_interval: 100
eval_steps: 1000
total_steps: 500000
overfit_single_batch: false
exp_name: ???

video_eval:
  context_frames: 16
  generated_frames: 48
  sample_steps: 4
  context_tau: 0.9
  fps: 20
  output_dir: artifacts/dreamer4_dynamics_eval
  tokenizer:
    config_path: scripts/dreamer4/config/breakout.yaml
    checkpoint_dir: null
    checkpoint_step: null

dataset:
  train_dir: data/tokenized/train/
  eval_dir: data/tokenized/eval/
  batch_size: 32
  batch_length: 256
  alternating_lengths:
    enabled: true
    short: 32
    long: 128
    long_every: 4
    final_long_only_steps: 0
  worker_count: 0
  num_threads: 2
  prefetch_buffer_size: 2
  eval:
    batch_length: 256
    max_batches: 16

dynamics:
  _target_: visionary.dynamics.DynamicsModel
  num_layers: 12
  num_heads: 8
  num_kv_heads: 2
  num_registers: 4
  num_obs_tokens: 32
  num_actions: 4
  max_step_size: 8
  model_dim: 256
  head_dim: 64
  mlp_hidden_dim: 768
  context_length: 64
  base: 10000.0
  attention_logit_soft_cap: 50.0

checkpoint:
  manager:
    _target_: visionary.common.checkpoint.CheckpointManager
    directory: gs://visionary-exp/breakout/dynamics/${exp_name}
    options:
      _target_: orbax.checkpoint.CheckpointManagerOptions
      save_interval_steps: 10000
      max_to_keep: 5
      enable_async_checkpointing: true
  resume_step: null

wandb:
  enabled: true
  project: visionary
